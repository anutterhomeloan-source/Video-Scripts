<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  :root{ --bluelt:#85B7EB; --gold:#FFD166; --red:#E24B4A; --teal:#1D9E75; }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:1080px;height:1920px;}
  body{
    font-family:'Segoe UI',Arial,sans-serif;
    background:linear-gradient(160deg,#042C53 0%,#0C447C 55%,#10243f 100%);
    color:#fff; display:flex; flex-direction:column;
    align-items:center; justify-content:center; padding:110px 90px;
  }
  .kicker{font-size:34px;letter-spacing:3px;text-transform:uppercase;color:var(--bluelt);font-weight:700;margin-bottom:22px;text-align:center;}
  .headline{font-size:74px;line-height:1.1;font-weight:800;text-align:center;margin-bottom:78px;}
  .headline .hl{color:var(--gold);}
  .scores{display:flex;align-items:center;justify-content:center;gap:38px;width:100%;margin-bottom:30px;}
  .chip{background:rgba(255,255,255,.07);border:2px solid rgba(133,183,235,.35);border-radius:24px;padding:38px 46px;text-align:center;flex:1;}
  .chip .lbl{font-size:32px;color:#cfe0f2;font-weight:600;text-transform:uppercase;letter-spacing:2px;margin-bottom:14px;}
  .chip .val{font-size:96px;font-weight:800;line-height:1;}
  .before .val{color:#fff;}
  .after .val{color:var(--red);}
  .arrow{font-size:80px;color:var(--red);font-weight:900;flex:none;}
  .drop{font-size:60px;font-weight:800;color:var(--red);text-align:center;margin-top:14px;}
  .footnote{margin-top:64px;font-size:42px;text-align:center;color:var(--gold);font-weight:800;line-height:1.35;}
</style>
</head>
<body>
  <div class="kicker">Cleaning up your credit?</div>
  <div class="headline">Closing your oldest card can <span class="hl">drop</span> your score</div>
  <div class="scores">
    <div class="chip before"><div class="lbl">Before</div><div class="val">720</div></div>
    <div class="arrow">&#8594;</div>
    <div class="chip after"><div class="lbl">After</div><div class="val">680</div></div>
  </div>
  <div class="drop">&minus;40 pts</div>
  <div class="footnote">All she did was close one old card.<br>Keep it open before you buy.</div>
</body>
</html>
