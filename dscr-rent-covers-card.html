<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  :root{ --bluelt:#85B7EB; --gold:#FFD166; --teal:#1D9E75; }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:1080px;height:1920px;}
  body{
    font-family:'Segoe UI',Arial,sans-serif;
    background:linear-gradient(160deg,#042C53 0%,#0C447C 55%,#10243f 100%);
    color:#fff; display:flex; flex-direction:column;
    align-items:center; justify-content:center; padding:110px 90px; text-align:center;
  }
  .kicker{font-size:36px;letter-spacing:3px;text-transform:uppercase;color:var(--bluelt);font-weight:700;margin-bottom:34px;}
  .headline{font-size:82px;line-height:1.12;font-weight:800;margin-bottom:80px;}
  .headline .hl{color:var(--gold);}
  .row{display:flex;align-items:center;justify-content:center;gap:30px;width:100%;margin-bottom:26px;}
  .pill{background:rgba(255,255,255,.08);border:2px solid rgba(133,183,235,.4);border-radius:24px;padding:36px 40px;font-size:46px;font-weight:800;flex:1;}
  .pill .sm{display:block;font-size:30px;color:#cfe0f2;font-weight:600;margin-bottom:10px;text-transform:uppercase;letter-spacing:2px;}
  .ge{font-size:70px;font-weight:900;color:var(--teal);flex:none;}
  .footnote{margin-top:70px;font-size:44px;color:var(--gold);font-weight:800;line-height:1.35;}
</style>
</head>
<body>
  <div class="kicker">Real estate investors</div>
  <div class="headline">DSCR = does the rent <span class="hl">cover the payment?</span></div>
  <div class="row">
    <div class="pill"><span class="sm">Rent</span>$2,500</div>
    <div class="ge">&#8805;</div>
    <div class="pill"><span class="sm">Payment</span>$2,100 &#9989;</div>
  </div>
  <div class="footnote">Qualify on the property — not your income.<br>No tax returns. No W-2s.</div>
</body>
</html>
