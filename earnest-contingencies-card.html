<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  :root{ --bluelt:#85B7EB; --teal:#1D9E75; --gold:#FFD166; }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:1080px;height:1920px;}
  body{
    font-family:'Segoe UI',Arial,sans-serif;
    background:linear-gradient(160deg,#042C53 0%,#0C447C 55%,#10243f 100%);
    color:#fff; display:flex; flex-direction:column;
    align-items:center; justify-content:center; padding:110px 90px;
  }
  .kicker{font-size:34px;letter-spacing:3px;text-transform:uppercase;color:var(--bluelt);font-weight:700;margin-bottom:22px;text-align:center;}
  .headline{font-size:78px;line-height:1.08;font-weight:800;text-align:center;margin-bottom:70px;}
  .headline .hl{color:var(--gold);}
  .list{width:100%;display:flex;flex-direction:column;gap:40px;}
  .item{display:flex;align-items:center;gap:38px;background:rgba(255,255,255,.06);border:2px solid rgba(133,183,235,.35);border-radius:26px;padding:40px 48px;}
  .check{width:78px;height:78px;border-radius:50%;flex:none;background:var(--teal);display:flex;align-items:center;justify-content:center;font-size:46px;font-weight:900;color:#fff;}
  .label{font-size:54px;font-weight:700;line-height:1.15;}
  .footnote{margin-top:78px;font-size:40px;text-align:center;color:var(--gold);font-weight:800;line-height:1.35;}
</style>
</head>
<body>
  <div class="kicker">Earnest money</div>
  <div class="headline">3 things that protect<br>your <span class="hl">deposit</span></div>
  <div class="list">
    <div class="item"><div class="check">&#10003;</div><div class="label">Financing contingency</div></div>
    <div class="item"><div class="check">&#10003;</div><div class="label">Inspection contingency</div></div>
    <div class="item"><div class="check">&#10003;</div><div class="label">Appraisal contingency</div></div>
  </div>
  <div class="footnote">It's not a fee. It's YOUR money.</div>
</body>
</html>
