<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  :root{ --bluelt:#85B7EB; --gold:#FFD166; --red:#E24B4A; --teal:#1D9E75; }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:1080px;height:1920px;}
  body{
    font-family:'Segoe UI',Arial,sans-serif;
    background:linear-gradient(160deg,#042C53 0%,#0C447C 55%,#10243f 100%);
    color:#fff; display:flex; flex-direction:column;
    align-items:center; justify-content:center; padding:110px 90px;
  }
  .kicker{font-size:34px;letter-spacing:3px;text-transform:uppercase;color:var(--bluelt);font-weight:700;margin-bottom:22px;text-align:center;}
  .headline{font-size:68px;line-height:1.12;font-weight:800;text-align:center;margin-bottom:70px;}
  .headline .hl{color:var(--gold);}
  .col{display:flex;flex-direction:column;gap:30px;width:100%;}
  .box{background:rgba(255,255,255,.06);border:2px solid rgba(133,183,235,.35);border-radius:26px;padding:44px 48px;text-align:center;}
  .box.old{border-color:rgba(226,75,74,.5);}
  .box.new{border-color:rgba(29,158,117,.6);}
  .lbl{font-size:30px;color:#cfe0f2;font-weight:700;text-transform:uppercase;letter-spacing:3px;margin-bottom:20px;}
  .box.old .lbl{color:var(--red);}
  .box.new .lbl{color:var(--teal);}
  .txt{font-size:46px;font-weight:700;line-height:1.25;}
  .arrow{align-self:center;font-size:60px;color:var(--gold);font-weight:900;margin:6px 0;}
  .footnote{margin-top:60px;font-size:40px;text-align:center;color:var(--gold);font-weight:800;line-height:1.35;}
</style>
</head>
<body>
  <div class="kicker">Buying before you sell?</div>
  <div class="headline">You don't have to <span class="hl">sell first</span></div>
  <div class="col">
    <div class="box old"><div class="lbl">Old way</div><div class="txt">Sell first.<br>Then scramble to buy.</div></div>
    <div class="arrow">&#8595;</div>
    <div class="box new"><div class="lbl">This way</div><div class="txt">Buy first.<br>Backup offer on the old house.</div></div>
  </div>
  <div class="footnote">That backup offer is the whole point.</div>
</body>
</html>
