<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  :root{ --bluelt:#85B7EB; --gold:#FFD166; --red:#E24B4A; --teal:#1D9E75; }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:1080px;height:1920px;}
  body{
    font-family:'Segoe UI',Arial,sans-serif;
    background:linear-gradient(160deg,#042C53 0%,#0C447C 55%,#10243f 100%);
    color:#fff; display:flex; flex-direction:column;
    align-items:center; justify-content:center; padding:110px 90px;
  }
  .kicker{font-size:34px;letter-spacing:3px;text-transform:uppercase;color:var(--bluelt);font-weight:700;margin-bottom:30px;text-align:center;}
  .stack{width:100%;display:flex;flex-direction:column;gap:34px;margin-bottom:36px;}
  .box{background:rgba(255,255,255,.07);border:2px solid rgba(133,183,235,.35);border-radius:26px;padding:50px 46px;text-align:center;}
  .box .lbl{font-size:36px;color:#cfe0f2;font-weight:600;margin-bottom:14px;}
  .box .big{font-size:120px;font-weight:800;line-height:1;}
  .deposited .big{color:#fff;}
  .usable .big{color:var(--red);}
  .reason{font-size:40px;font-weight:700;color:var(--gold);margin-top:16px;}
  .footnote{margin-top:30px;font-size:50px;text-align:center;color:#fff;font-weight:800;line-height:1.3;}
  .footnote .hl{color:var(--gold);}
</style>
</head>
<body>
  <div class="kicker">Down payment funds</div>
  <div class="stack">
    <div class="box deposited"><div class="lbl">She deposited</div><div class="big">$3,000</div></div>
    <div class="box usable"><div class="lbl">We could use</div><div class="big">$0</div><div class="reason">(it was a personal loan)</div></div>
  </div>
  <div class="footnote">You can't <span class="hl">borrow</span> your down payment.</div>
</body>
</html>
