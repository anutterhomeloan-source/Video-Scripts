<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  :root{ --bluelt:#85B7EB; --gold:#FFD166; }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:1080px;height:1920px;}
  body{
    font-family:'Segoe UI',Arial,sans-serif;
    background:linear-gradient(160deg,#042C53 0%,#0C447C 55%,#10243f 100%);
    color:#fff; display:flex; flex-direction:column;
    align-items:center; justify-content:center; padding:120px 90px; text-align:center;
  }
  .kicker{font-size:36px;letter-spacing:3px;text-transform:uppercase;color:var(--bluelt);font-weight:700;margin-bottom:40px;}
  .headline{font-size:88px;line-height:1.12;font-weight:800;margin-bottom:60px;}
  .headline .hl{color:var(--gold);}
  .sub{font-size:52px;line-height:1.35;color:#eaf2fb;font-weight:600;}
  .sub .hl{color:#fff;font-weight:800;}
</style>
</head>
<body>
  <div class="kicker">Asset-based loans</div>
  <div class="headline">Asset-rich but income-light? <span class="hl">You're not stuck.</span></div>
  <div class="sub">Turn your savings &amp; investments into <span class="hl">qualifying income.</span></div>
</body>
</html>
