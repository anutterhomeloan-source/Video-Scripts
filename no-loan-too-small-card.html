<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  :root{ --bluelt:#85B7EB; --gold:#FFD166; }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:1080px;height:1920px;}
  body{
    font-family:'Segoe UI',Arial,sans-serif;
    background:linear-gradient(160deg,#042C53 0%,#0C447C 55%,#10243f 100%);
    color:#fff; display:flex; flex-direction:column;
    align-items:center; justify-content:center; padding:120px 90px; text-align:center;
  }
  .kicker{font-size:36px;letter-spacing:3px;text-transform:uppercase;color:var(--bluelt);font-weight:700;margin-bottom:44px;}
  .headline{font-size:92px;line-height:1.12;font-weight:800;margin-bottom:56px;}
  .headline .hl{color:var(--gold);}
  .sub{font-size:46px;line-height:1.4;color:#eaf2fb;font-weight:600;}
</style>
</head>
<body>
  <div class="kicker">No loan is too small</div>
  <div class="headline">A big lender's "no" <span class="hl">isn't the end of your story.</span></div>
  <div class="sub">It just means you were talking to the wrong people.</div>
</body>
</html>
