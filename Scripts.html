      <p>So here's the thing most buyers don't realize. Your lender — aka me — bases the value of the home on the appraisal, not the contract price. So if the appraisal comes in lower, there's a gap. And when buyers see that number, they panic. Which makes sense — nobody tells you this is even a possibility.</p>
      <p>We actually had a deal under contract at $535,000 that appraised $60,000 under. That's a big gap. And the seller wouldn't budge, so the deal had to be cancelled. But what I want you to know is — we had options before we got to that point.</p>
      <div class="visual">VISUAL: Story-hook card — "$535,000 contract / $60,000 under appraisal / Here's what happened." (low-appraisal-card.png)</div>
      <h2>Answer + Change</h2>
      <p>When a low appraisal happens, here's what you can actually do:</p>
      <div class="visual">VISUAL: Simple 4-option list overlay — "When the appraisal comes in low…"</div>
      <ul>
        <li><strong>Option one</strong> — renegotiate the price with the seller. Sometimes they'll come down, especially if they want the deal to close.</li>
        <li><strong>Option two</strong> — bring extra cash to cover the gap. If you love the home and you have it, this might be worth it.</li>
        <li><strong>Option three</strong> — request a value reconsideration. If there are better comps your appraiser missed, your lender can push back on that number.</li>
        <li><strong>Option four</strong> — walk away. And honestly? Sometimes that's the right financial decision.</li>
      </ul>
      <div class="visual">VISUAL: Highlight "value reconsideration" — "Most buyers don't know this exists"</div>
      <h2>End Result</h2>
      <p>The buyers who get through a low appraisal without losing their minds are the ones who had the right agent and lender in their corner before it happened — not after. So if you want someone who's going to walk you through exactly what to do when something like this comes up, schedule a call with me. Link is in my bio.</p>
      <div class="block"><strong>Image option (chosen):</strong> Option B — story-hook card. Built: low-appraisal-card.png</div>
    `
  }
];

function flash(btn, label){
  const old = btn.innerHTML; btn.innerHTML = label || '✓ Copied'; btn.classList.add('copied');
  setTimeout(()=>{ btn.innerHTML = old; btn.classList.remove('copied'); }, 1600);
}
function doCopy(btn, text, label){
  navigator.clipboard.writeText(text).then(()=> flash(btn, label))
    .catch(()=> alert('Copy failed — select the text manually.'));
}
function copyScript(e, n){
  e.stopPropagation();
  const nodes = document.querySelectorAll(`#card-${n} .body p, #card-${n} .body li`);
  const text = Array.from(nodes).map(el => el.textContent.trim()).filter(Boolean).join('\n\n');
  doCopy(e.currentTarget, text);
}
function copyTitle(e, n){
  e.stopPropagation();
  doCopy(e.currentTarget, SCRIPTS.find(s=>s.n===n).title);
}
function copyCaption(e, n, i){
  e.stopPropagation();
  doCopy(e.currentTarget, SCRIPTS.find(s=>s.n===n).captions[i], '✓');
}

let filter = "all";
function setFilter(el){ document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active')); el.classList.add('active'); filter = el.dataset.f; render(); }

function render(){
  const q = document.getElementById('search').value.toLowerCase();
  const list = document.getElementById('list');
  const items = SCRIPTS.filter(s=>{
    if(filter!=="all" && s.type!==filter && s.status!==filter) return false;
    if(q && !(s.title+s.body+s.cta).toLowerCase().includes(q)) return false;
    return true;
  });
  if(!items.length){ list.innerHTML = '<div class="empty">No scripts match.</div>'; return; }
  list.innerHTML = items.map(s=>{
    const tcls = s.type==="Talking Head" ? "b-talk":"b-reenact";
    const scls = "s-"+s.status.toLowerCase();
    const assets = (s.images && s.images.length) ? `<div class="assets"><h2>Image assets</h2><div class="asset-grid">${s.images.map(im=>`<div class="asset"><a href="${im.file}" target="_blank"><img src="${im.file}" alt="${im.label}"></a><div class="cap">${im.label}<br><a href="${im.file}" target="_blank">open full size ↗</a></div></div>`).join('')}</div></div>` : '';
    const caps = (s.captions && s.captions.length) ? `<div class="caps"><h2>Captions</h2>${s.captions.map((c,i)=>`<div class="cap-row"><span class="cap-txt">${c}</span><button class="minicopy" onclick="copyCaption(event,${s.n},${i})">📋 Copy</button></div>`).join('')}</div>` : '';
    return `<div class="card" id="card-${s.n}">
      <div class="row" onclick="document.getElementById('card-${s.n}').classList.toggle('open')">
        <div class="num">${s.n}</div>
        <div class="meta">
          <div class="title">${s.title}</div>
          <div class="submeta">${s.date} · CTA: ${s.cta}</div>
        </div>
        <span class="badge ${tcls}">${s.type}</span>
        <span class="status ${scls}">${s.status}</span>
        <span class="chev">▸</span>
      </div>
      <div class="body"><button class="copybtn" onclick="copyScript(event, ${s.n})">📋 Copy for teleprompter</button><button class="copybtn alt" onclick="copyTitle(event, ${s.n})">📋 Copy title</button>${s.body}${caps}${assets}</div>
    </div>`;
  }).join('');
}
render();
</script>
</body>
